name: AWS OIDC Deployment

on:
  push:
    branches:
      - main   # change if your branch is different

# REQUIRED for OIDC authentication (this is critical)
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configure AWS credentials using OIDC (NO access keys used)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::150460248370:role/github-actions-role
          aws-region: us-east-1

      # 3. Debug step (confirms AWS auth works)
      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # 4. Your deployment commands go here
      - name: Deploy application
        run: |
          echo "Replace this with your deployment commands"
