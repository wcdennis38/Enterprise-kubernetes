name: Deploy to AWS using OIDC

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configure AWS credentials using OIDC (NO keys needed)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::150460248370:role/github-actions-role2
          aws-region: us-east-1

      # 3. Verify AWS authentication works
      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # 4. Example deployment step (replace with your real deploy)
      - name: Deploy step placeholder
        run: |
          echo "Add your deployment commands here"
